name: Publish Zenodo deposit

on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # commit comment on the tag's commit

env:
  BASE_ENV_VERSION: v0.1.0

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (tag)
        uses: actions/checkout@v5
        with:
          fetch-depth: 0   # need full history for git archive + PR discovery

      - name: Detect sandbox vs prod (from project.doi prefix)
        id: detect
        run: |
          set -euo pipefail
          DOI=$(awk '/^[[:space:]]*doi:/ {sub(/^[[:space:]]*doi:[[:space:]]*/, ""); print; exit}' myst.yml)
          if [ -z "$DOI" ]; then
            echo "::error::project.doi missing in myst.yml — run prepare-zenodo first"
            exit 1
          fi
          if [[ "$DOI" == 10.5072/* ]]; then
            echo "sandbox=true" >> "$GITHUB_OUTPUT"
            echo "Using sandbox.zenodo.org (DOI: $DOI)"
          else
            echo "sandbox=false" >> "$GITHUB_OUTPUT"
            echo "Using production zenodo.org (DOI: $DOI)"
          fi

      - name: Fetch base environment file
        run: curl -fsSL https://raw.githubusercontent.com/impact-scholars/isp-actions-config/${{ env.BASE_ENV_VERSION }}/environment.yml -o base-environment.yml

      - name: Setup micromamba
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: base-environment.yml
          generate-run-shell: true
          cache-environment: true
          cache-downloads: true

      - name: Install paper-specific packages
        shell: micromamba-shell {0}
        run: |
          if [ -f paper-environment.yml ]; then
            micromamba install --file paper-environment.yml --yes
          fi

      - name: Install zenodo-deposit deps
        shell: micromamba-shell {0}
        run: pip install -r scripts/requirements.txt

      - name: Build PDF
        shell: micromamba-shell {0}
        run: myst build --pdf

      - name: Locate PDF
        id: pdf
        run: |
          set -euo pipefail
          PDF=$(find _build/exports -maxdepth 3 -name '*.pdf' | head -1)
          if [ -z "$PDF" ]; then
            echo "::error::no PDF found under _build/exports/"
            exit 1
          fi
          echo "path=$PDF" >> "$GITHUB_OUTPUT"

      - name: Publish to Zenodo
        id: publish
        shell: micromamba-shell {0}
        env:
          ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}
          ZENODO_SANDBOX_TOKEN: ${{ secrets.ZENODO_SANDBOX_TOKEN }}
        run: |
          set -euo pipefail
          SANDBOX_FLAG=""
          if [ "${{ steps.detect.outputs.sandbox }}" = "true" ]; then SANDBOX_FLAG="--sandbox"; fi
          python scripts/zenodo-deposit.py publish \
            --pdf "${{ steps.pdf.outputs.path }}" \
            --tag "${{ github.ref_name }}" \
            --site-url "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}" \
            $SANDBOX_FLAG \
            > publish-result.json
          cat publish-result.json
          echo "draft_url=$(jq -r .draft_url publish-result.json)" >> "$GITHUB_OUTPUT"
          echo "version_doi=$(jq -r .version_doi publish-result.json)" >> "$GITHUB_OUTPUT"

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: zenodo-bundle-${{ github.ref_name }}
          path: _bundle/
          retention-days: 30

      - name: Comment on tagged commit
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: [
                `Zenodo draft for **${context.ref.replace('refs/tags/', '')}**: ${{ steps.publish.outputs.draft_url }}`,
                ``,
                `Predicted version DOI: \`${{ steps.publish.outputs.version_doi }}\``,
                ``,
                `Click Publish on Zenodo to finalize.`,
              ].join('\n')
            })
