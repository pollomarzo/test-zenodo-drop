name: Notify Zenodo new-version reminder

on:
  pull_request:
    types: [opened, reopened, ready_for_review]
    branches: [main]

permissions:
  contents: read
  pull-requests: write   # reusable workflow posts sticky comment + applies label
  issues: write          # reusable workflow creates the editor-action-needed label if missing

jobs:
  remind:
    uses: impact-scholars/isp-actions-config/.github/workflows/notify-newversion.yml@v0.2.0
