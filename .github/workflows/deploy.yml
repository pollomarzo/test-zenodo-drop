name: Deploy Paper

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    uses: impact-scholars/isp-actions-config/.github/workflows/deploy-paper.yml@feat/zenodo-drop
    with:
      base_url: /${{ github.event.repository.name }}
